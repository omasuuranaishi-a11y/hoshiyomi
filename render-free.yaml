services:
  - type: web
    name: omasu-instagram-story
    env: python
    plan: free
    buildCommand: pip install -r requirements-instagram.txt
    startCommand: uvicorn backend.automation_main_free:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: unused-free-mode
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_API_VERSION
        value: v25.0
      - key: INSTAGRAM_GRAPH_BASE_URL
        value: https://graph.instagram.com
      - key: PUBLIC_BASE_URL
        value: https://omasu-instagram-story.onrender.com
      - key: AUTOMATION_SECRET
        generateValue: true
      - key: STORY_TIMEZONE
        value: Asia/Tokyo
      - key: ALLOW_FALLBACK_COPY
        value: "true"
