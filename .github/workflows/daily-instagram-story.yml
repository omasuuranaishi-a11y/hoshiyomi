name: Three Daily Instagram Stories

on:
  schedule:
    # Three independent chances per slot. The service skips later attempts
    # after the first successful publish, so delayed GitHub events do not duplicate.
    - cron: "58 20 * * *"  # morning primary: 05:58 JST
    - cron: "8 21 * * *"   # morning backup 1: 06:08 JST
    - cron: "18 21 * * *"  # morning backup 2: 06:18 JST
    - cron: "30 0 * * *"   # morning column primary: 09:30 JST
    - cron: "40 0 * * *"   # morning column backup 1: 09:40 JST
    - cron: "50 0 * * *"   # morning column backup 2: 09:50 JST
    - cron: "30 9 * * *"   # evening primary: 18:30 JST
    - cron: "40 9 * * *"   # evening backup 1: 18:40 JST
    - cron: "50 9 * * *"   # evening backup 2: 18:50 JST
  workflow_dispatch:
    inputs:
      slot:
        description: Story slot
        required: true
        default: morning
        type: choice
        options:
          - morning
          - column
          - evening
      target_date:
        description: Optional YYYY-MM-DD in JST
        required: false
        type: string

concurrency:
  group: daily-instagram-story
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate and publish one story
        env:
          AUTOMATION_URL: ${{ secrets.AUTOMATION_URL }}
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SLOT: ${{ inputs.slot }}
          TARGET_DATE: ${{ inputs.target_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          case "${SCHEDULE}" in
            "58 20 * * *"|"8 21 * * *"|"18 21 * * *"|"0 21 * * *") SLOT="morning" ;;
            "30 0 * * *"|"40 0 * * *"|"50 0 * * *") SLOT="night" ;;
            "30 9 * * *"|"40 9 * * *"|"50 9 * * *") SLOT="evening" ;;
            *) SLOT="${MANUAL_SLOT:-morning}" ;;
          esac
          if [ "${SLOT}" = "column" ]; then SLOT="night"; fi
          # The July 17 morning story was recovered manually after the first-run failure.
          # Skip any delayed copy of the original 06:00 event to prevent duplication.
          if [ "${EVENT_NAME}" = "schedule" ] && [ "${SLOT}" = "morning" ] && [ "$(TZ=Asia/Tokyo date +%F)" = "2026-07-17" ]; then
            echo "July 17 morning story already recovered; skipping delayed event."
            exit 0
          fi
          QUERY="slot=${SLOT}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            QUERY="${QUERY}&force=true"
          fi
          if [ -n "${TARGET_DATE}" ]; then
            QUERY="${QUERY}&target_date=${TARGET_DATE}"
          fi
          SEPARATOR="?"
          case "${AUTOMATION_URL}" in *\?*) SEPARATOR="&" ;; esac
          curl --fail-with-body --show-error --silent --retry 3 --retry-all-errors --max-time 180 \
            --request POST \
            --header "Authorization: Bearer ${AUTOMATION_SECRET}" \
            "${AUTOMATION_URL}${SEPARATOR}${QUERY}"
