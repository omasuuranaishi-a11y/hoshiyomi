name: Three Daily Instagram Stories

on:
  schedule:
    # Start away from the top of the hour, then wait until the exact JST target.
    # One event per slot prevents duplicate Instagram stories.
    - cron: "41 20 * * *"  # starts 05:41 JST; publishes at 06:00
    - cron: "11 0 * * *"   # starts 09:11 JST; publishes at 09:30
    - cron: "11 9 * * *"   # starts 18:11 JST; publishes at 18:30
  workflow_dispatch:
    inputs:
      slot:
        description: Story slot
        required: true
        default: morning
        type: choice
        options:
          - morning
          - column
          - evening
      target_date:
        description: Optional YYYY-MM-DD in JST
        required: false
        type: string

concurrency:
  group: daily-instagram-story
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate and publish one story
        env:
          AUTOMATION_URL: ${{ secrets.AUTOMATION_URL }}
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SLOT: ${{ inputs.slot }}
          TARGET_DATE: ${{ inputs.target_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          case "${SCHEDULE}" in
            "41 20 * * *") SLOT="morning"; PUBLISH_AT="06:00" ;;
            "11 0 * * *") SLOT="night"; PUBLISH_AT="09:30" ;;
            "11 9 * * *") SLOT="evening"; PUBLISH_AT="18:30" ;;
            *) SLOT="${MANUAL_SLOT:-morning}" ;;
          esac
          if [ "${SLOT}" = "column" ]; then SLOT="night"; fi
          if [ "${EVENT_NAME}" = "schedule" ]; then
            TARGET_EPOCH="$(TZ=Asia/Tokyo date -d "$(TZ=Asia/Tokyo date +%F) ${PUBLISH_AT}:00" +%s)"
            NOW_EPOCH="$(date +%s)"
            WAIT_SECONDS="$((TARGET_EPOCH - NOW_EPOCH))"
            if [ "${WAIT_SECONDS}" -gt 0 ]; then
              echo "Waiting ${WAIT_SECONDS}s for ${PUBLISH_AT} JST."
              sleep "${WAIT_SECONDS}"
            else
              echo "The scheduler started late; publishing immediately."
            fi
          fi
          # The July 17 morning story was recovered manually after the first-run failure.
          # Skip any delayed copy of the original 06:00 event to prevent duplication.
          if [ "${EVENT_NAME}" = "schedule" ] && [ "${SLOT}" = "morning" ] && [ "$(TZ=Asia/Tokyo date +%F)" = "2026-07-17" ]; then
            echo "July 17 morning story already recovered; skipping delayed event."
            exit 0
          fi
          QUERY="slot=${SLOT}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            QUERY="${QUERY}&force=true"
          fi
          if [ -n "${TARGET_DATE}" ]; then
            QUERY="${QUERY}&target_date=${TARGET_DATE}"
          fi
          SEPARATOR="?"
          case "${AUTOMATION_URL}" in *\?*) SEPARATOR="&" ;; esac
          # Do not retry this POST: an ambiguous network response must never
          # create a second Instagram story.
          curl --fail-with-body --show-error --silent --max-time 180 \
            --request POST \
            --header "Authorization: Bearer ${AUTOMATION_SECRET}" \
            "${AUTOMATION_URL}${SEPARATOR}${QUERY}"
