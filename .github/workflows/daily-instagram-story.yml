name: Daily Instagram Story

on:
  schedule:
    # 21:00 UTC = 06:00 JST (next day)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: daily-instagram-story
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate and publish today's story
        env:
          AUTOMATION_URL: ${{ secrets.AUTOMATION_URL }}
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${AUTOMATION_SECRET}" \
            "${AUTOMATION_URL}"
