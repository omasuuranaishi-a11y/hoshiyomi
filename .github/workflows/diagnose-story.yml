name: Recover Morning Story
on:
  push:
    branches: [main]
jobs:
  publish-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish missed morning story
        env:
          AUTOMATION_URL: ${{ secrets.AUTOMATION_URL }}
          AUTOMATION_SECRET: ${{ secrets.AUTOMATION_SECRET }}
        run: |
          SEPARATOR="?"
          case "${AUTOMATION_URL}" in *\?*) SEPARATOR="&" ;; esac
          curl --fail-with-body --show-error --silent --retry 2 --retry-all-errors --max-time 180 \
            --request POST \
            --header "Authorization: Bearer ${AUTOMATION_SECRET}" \
            "${AUTOMATION_URL}${SEPARATOR}slot=morning&target_date=2026-07-17"
